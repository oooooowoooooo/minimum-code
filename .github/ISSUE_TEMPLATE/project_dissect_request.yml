name: Project dissection request
description: Request a new open-source project reading module.
title: "[Dissection]: "
labels: ["source-reading", "content"]
body:
  - type: input
    id: project
    attributes:
      label: Project
      placeholder: FastAPI, LangChain, Next.js, etc.
    validations:
      required: true
  - type: input
    id: repository
    attributes:
      label: Repository URL
      placeholder: https://github.com/...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it belongs here
      description: What architecture, pattern, or engineering boundary should learners study?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suggested first slice
      description: Name 1-3 files or concepts for a small initial dissection.
